<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venom - Telegram Management Tool</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🐍 Venom</h1>
            <p>Telegram Account Management Tool</p>
        </div>

        <div class="setup-section">
            <h2>Account Setup</h2>
            <form id="setupForm">
                <div class="form-group">
                    <label for="api_id">API ID *</label>
                    <input type="number" id="api_id" name="api_id" placeholder="Enter your Telegram API ID" required>
                    <small>Get it from https://my.telegram.org/apps</small>
                </div>

                <div class="form-group">
                    <label for="api_hash">API Hash *</label>
                    <input type="text" id="api_hash" name="api_hash" placeholder="Enter your Telegram API Hash" required>
                    <small>Get it from https://my.telegram.org/apps</small>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number *</label>
                    <input type="tel" id="phone" name="phone" placeholder="+1234567890" required>
                    <small>Include country code with + sign</small>
                </div>

                <div class="form-group">
                    <label for="nickname">Nickname *</label>
                    <input type="text" id="nickname" name="nickname" placeholder="Enter account nickname" required>
                    <small>For internal identification</small>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn btn-primary">💾 Save All</button>
                    <button type="button" class="btn btn-secondary" onclick="testConnection()">🔗 Test Connection</button>
                    <button type="button" class="btn btn-danger" onclick="clearSession()">🗑️ Clear All</button>
                </div>
            </form>
        </div>

        <div class="status-section" id="statusSection" style="display: none;">
            <h3>Status</h3>
            <div id="statusMessage" class="status-message"></div>
        </div>

        <div class="saved-data-section" id="savedDataSection" style="display: none;">
            <h3>📊 Saved Configuration</h3>
            <div id="savedDataContent" class="data-display"></div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
