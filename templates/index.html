<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venom - Telegram Account Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="navbar">
        <h1>🐍 Venom</h1>
        <p>Telegram Account Manager</p>
    </div>

    <div class="container">
        <!-- LOGIN SECTION -->
        <div id="loginSection" class="section active">
            <div class="card">
                <h2>📱 Add Telegram Account</h2>
                
                <div id="otpPhoneForm" class="form-section">
                    <div class="form-group">
                        <label>Phone Number *</label>
                        <input type="tel" id="phone" placeholder="+1234567890" required>
                        <small>Include country code with + sign</small>
                    </div>
                    <button onclick="requestOTP()" class="btn btn-primary" id="requestBtn">📨 Send OTP</button>
                </div>

                <div id="otpVerifyForm" class="form-section hidden">
                    <div id="otpMessage" class="message info"></div>
                    
                    <div class="form-group">
                        <label>OTP Code *</label>
                        <input type="text" id="otp" placeholder="123456" maxlength="6" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Account Nickname (optional)</label>
                        <input type="text" id="nickname" placeholder="My Account">
                    </div>
                    
                    <div id="passwordSection" class="hidden">
                        <div class="form-group">
                            <label>2FA Password *</label>
                            <input type="password" id="password" placeholder="Enter your 2FA password">
                            <small>Your Telegram account requires a password</small>
                        </div>
                    </div>
                    
                    <div class="button-group">
                        <button onclick="verifyOTP()" class="btn btn-primary" id="verifyBtn">✅ Verify & Login</button>
                        <button onclick="backToPhone()" class="btn btn-secondary">← Back</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN DASHBOARD -->
        <div id="dashboardSection" class="section hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('accounts')">📋 Accounts</button>
                <button class="tab-btn" onclick="switchTab('messaging')">💬 Send Message</button>
            </div>

            <!-- ACCOUNTS TAB -->
            <div id="accounts" class="tab-content active">
                <div class="card">
                    <h2>📋 Your Accounts</h2>
                    <div id="accountsList" class="accounts-grid">
                        <p class="loading">Loading...</p>
                    </div>
                </div>
            </div>

            <!-- MESSAGING TAB -->
            <div id="messaging" class="tab-content hidden">
                <div class="card">
                    <h2>💬 Broadcast Message</h2>
                    <form id="messageForm">
                        <div class="form-group">
                            <label>Select Account *</label>
                            <select id="msgPhone" required onchange="loadGroupsForMessaging()">
                                <option value="">-- Select Account --</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Groups/Channels *</label>
                            <div id="groupsList" class="groups-container">
                                <p class="loading">Select account first</p>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Message *</label>
                            <textarea id="messageText" placeholder="Enter message..." rows="5" required></textarea>
                        </div>

                        <div class="form-group">
                            <label>Delay Between Messages (seconds)</label>
                            <input type="number" id="messageDelay" value="0" min="0" step="0.1">
                        </div>

                        <button type="submit" class="btn btn-primary">📤 Send to Selected</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- STATUS MESSAGE -->
    <div id="statusMessage" class="status-message hidden"></div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
